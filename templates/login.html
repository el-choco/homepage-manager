<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Homepage Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 10px; width: 100%; max-width: 400px; padding: 30px; }
    </style>
</head>
<body>
<div class="login-card shadow">
    <h3 class="text-center mb-4 text-light">Homepage Manager</h3>
    {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <div class="mb-3">
            <label class="form-label text-muted small">Username</label>
            <input type="text" name="username" class="form-control" required autocomplete="off">
        </div>
        <div class="mb-4">
            <label class="form-label text-muted small">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
    </form>
</div>
</body>
</html>
